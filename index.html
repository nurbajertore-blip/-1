<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Футбол: Гид для новичка</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; line-height: 1.6; margin: 0; background: #f0f2f0; }
        header { background: linear-gradient(135deg, #2d5a27 0%, #1e3d1a 100%); color: white; padding: 2.5rem 1rem; text-align: center; box-shadow: 0 4px 10px rgba(0,0,0,0.2); }
        .container { max-width: 900px; margin: 20px auto; padding: 0 20px; }
        .card { background: white; padding: 25px; margin-bottom: 25px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        h2 { color: #2d5a27; border-left: 5px solid #2d5a27; padding-left: 15px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 15px; margin-top: 15px; }
        .pos-item { background: #e8f5e9; padding: 15px; border-radius: 8px; text-decoration: none; color: #333; transition: 0.3s; text-align: center; border: 1px solid #c8e6c9; }
        .pos-item:hover { background: #c8e6c9; transform: translateY(-3px); }
        .btn-tactics { display: block; background: #2d5a27; color: white; text-align: center; padding: 15px; border-radius: 8px; text-decoration: none; font-weight: bold; margin-top: 10px; }
    </style>
</head>
<body>
<header><h1>Мир Футбола ⚽</h1><p>Гид для будущих чемпионов</p></header>
<div class="container">
    <section class="card">
        <h2>Позиции на поле</h2>
        <p>Нажми на роль, чтобы узнать подробности и лучших игроков:</p>
        <div class="grid">
            <a href="goalkeeper.html" class="pos-item"><strong>🧤 Вратарь</strong></a>
            <a href="defenders.html" class="pos-item"><strong>🛡 Защитники</strong></a>
            <a href="midfielders.html" class="pos-item"><strong>🔄 Полузащитники</strong></a>
            <a href="forwards.html" class="pos-item"><strong>🎯 Нападающие</strong></a>
        </div>
    </section>
    <section class="card">
        <h2>Стратегия игры</h2>
        <a href="tactics.html" class="btn-tactics">🧠 Посмотреть тактики и тренеров</a>
    </section>
</div>
</body>
</html>
